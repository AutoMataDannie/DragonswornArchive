<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡尔达鲁斯的神殿</title>
    <style>
        @font-face {
            font-family: 'MyPixelFont';
            src: url('Uranus_Pixel_11Px.ttf') format('truetype');
        }

        :root {
            --pixel-purple: #e6d5ff; 
            --accent-glow: rgba(180, 150, 255, 0.5);
            --glass-bg: rgba(230, 213, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --highlight: #ffeb3b; 
            --special: #90caf9;
            --player-choice: #b39ddb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--pixel-purple);
            min-height: 100vh;
            font-family: 'MyPixelFont', sans-serif;
            overflow-x: hidden;
        }

        /* --- 样式引擎 --- */
        .highlight { color: var(--highlight); text-shadow: 0 0 5px var(--highlight); font-weight: bold; }
        .special { color: var(--special); font-weight: bold; }
        .player-choice {
            display: block; margin: 10px 0 10px 20px;
            color: var(--player-choice); font-style: italic;
            border-left: 2px solid var(--player-choice); padding-left: 12px;
        }

        /* --- 立绘系统 --- */
        #portrait-container {
            position: fixed; bottom: 0; left: 0;
            z-index: 5000; pointer-events: none;
            transition: all 1s ease;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
        }
        .portrait-welcome { transform: scale(2.0); transform-origin: bottom left; left: 2% !important; }
        .portrait-main { transform: scale(1.5); transform-origin: bottom left; left: 2% !important; }
        #npc-img { max-height: 90vh; width: auto; display: block; }

        /* --- 欢迎页 --- */
        #welcome-screen {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            z-index: 4000; background: rgba(0,0,0,0.6);
            transition: opacity 1s ease;
        }
        .welcome-box {
            background: rgba(25, 25, 45, 0.9); backdrop-filter: blur(20px);
            padding: 50px; border-radius: 30px; border: 1px solid var(--glass-border);
            text-align: center; width: 85%; max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #typed-text { font-size: 1.25rem; line-height: 1.8; margin-bottom: 30px; min-height: 6em; text-align: left; }

        .input-area { 
            display: none; opacity: 0; transition: 0.8s; 
            flex-direction: column; align-items: center; gap: 20px;
        }
        .input-area.show { display: flex; opacity: 1; }

        #name-input {
            background: rgba(255,255,255,0.1); border: 2px solid var(--glass-border);
            border-radius: 10px; padding: 12px; color: white;
            font-family: 'MyPixelFont'; font-size: 1.2rem; width: 300px; text-align: center; outline: none;
        }

        /* --- 按钮 --- */
        .glass-btn {
            padding: 12px 30px; background: var(--glass-bg);
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 50px; color: var(--pixel-purple);
            font-family: 'MyPixelFont'; cursor: pointer; transition: 0.3s;
            text-align: center;
        }
        .glass-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .glass-btn:disabled { filter: grayscale(1); opacity: 0.3; cursor: not-allowed; }
        .glass-btn.active { background: var(--pixel-purple); color: #1a1a2e; box-shadow: 0 0 15px var(--pixel-purple); }

        /* --- 主站布局 --- */
        #main-content {
            display: none; opacity: 0; padding: 40px 40px 40px 30%;
            transition: opacity 1s ease;
        }
        .shelf-msg { text-align: center; font-style: italic; margin-bottom: 30px; color: #b39ddb; line-height: 1.6; }

        .main-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .sub-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

        .content-window {
            background: rgba(20, 20, 40, 0.7); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            height: 70vh; overflow-y: auto;
        }
        .text-line { padding: 20px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); line-height: 1.8; }
        .num-tag { opacity: 0.4; font-size: 0.8rem; margin-bottom: 5px; display: block; }

        /* --- 卡片 --- */
        .card { margin-bottom: 15px; border-radius: 15px; border: 1px solid var(--glass-border); overflow: hidden; }
        .card-head { background: var(--glass-bg); padding: 18px; cursor: pointer; display: flex; justify-content: space-between; }
        .card-body { display: none; padding: 25px; background: rgba(0,0,0,0.4); line-height: 1.8; }
        .card.open .card-body { display: block; }

        .hidden { display: none !important; }

/* ========== 手机端适配 (屏幕宽度小于768px) ========== */
@media (max-width: 768px) {

    /* 1. 主内容区 - 减少左边距 */
    #main-content {
        padding: 20px 15px 20px 15px !important;
    }

    /* 2. 主站隐藏立绘（关键修改） */
    #main-content ~ #portrait-container,
    #portrait-container.portrait-main {
        display: none !important;
    }

    /* 3. 欢迎页立绘保持不变 */
    .portrait-welcome {
        transform: scale(1.2) !important;
        left: 0% !important;
        display: block !important;
    }

    /* 4. 欢迎页弹窗 - 宽度适配 */
    .welcome-box {
        width: 90% !important;
        padding: 30px 20px !important;
        margin: 0 5% !important;
    }
    
    #typed-text {
        font-size: 0.9rem !important;
        line-height: 1.6 !important;
    }

    /* 5. 主按钮导航 - 改成换行 */
    .main-nav {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 8px !important;
    }

    /* 6. 次级导航 - 滚动式 */
    .sub-nav {
        overflow-x: auto !important;
        flex-wrap: nowrap !important;
        justify-content: flex-start !important;
        gap: 6px !important;
        padding-bottom: 8px !important;
        -webkit-overflow-scrolling: touch;
    }
    
    .sub-nav .glass-btn {
        white-space: nowrap !important;
        padding: 8px 15px !important;
        font-size: 0.8rem !important;
    }

    /* 7. 内容窗口 - 高度自动 */
    .content-window {
        height: auto !important;
        max-height: 60vh !important;
        padding: 15px !important;
    }

    /* 8. 文本行 - 字体大小 */
    .text-line {
        font-size: 0.85rem !important;
        padding: 12px 8px !important;
    }

    /* 9. 卡片样式 */
    .card-head {
        padding: 12px !important;
        font-size: 0.9rem !important;
    }
    
    .card-body {
        padding: 15px !important;
        font-size: 0.85rem !important;
    }

    /* 10. 玩家选项缩进 */
    .player-choice {
        margin-left: 8px !important;
        padding-left: 8px !important;
    }

    /* 11. 玻璃按钮通用 */
    .glass-btn {
        padding: 8px 12px !important;
        font-size: 0.75rem !important;
    }

    /* 12. 输入框 */
    #name-input {
        width: 80% !important;
        font-size: 1rem !important;
        padding: 10px !important;
    }

    /* 13. 欢迎页弹窗文字大小 */
    .welcome-box .glass-btn {
        font-size: 0.8rem !important;
        padding: 10px 20px !important;
    }
}

/* ========== 超小手机 (宽度小于480px) ========== */
@media (max-width: 480px) {
    .main-nav {
        grid-template-columns: 1fr !important;
    }
    
    .content-window {
        max-height: 55vh !important;
    }
    
    .text-line {
        font-size: 0.75rem !important;
    }
    
    /* 超小手机欢迎页立绘稍微缩小 */
    .portrait-welcome {
        transform: scale(1.0) !important;
    }
}
		
    </style>
</head>
<body>

    <div id="portrait-container" class="portrait-welcome">
        <img src="npc-welcome.png" alt="立绘" id="npc-img">
    </div>

    <div id="welcome-screen">
        <div class="welcome-box">
            <div id="typed-text"></div>
            <div id="input-area" class="input-area">
                <input type="text" id="name-input" placeholder="输入你的名字..." maxlength="12">
                <button id="enter-btn" class="glass-btn" onclick="enterSite()" disabled>进入卡尔达鲁斯的记忆神殿</button>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="shelf-msg">多个卷轴静静躺在书架上，显然备受珍爱。<br>要阅读哪一卷呢？</div>
        <nav class="main-nav">
            <button class="glass-btn" onclick="switchTab('daily')">日常对话</button>
            <button class="glass-btn" onclick="switchTab('multi')">多人对话</button>
            <button class="glass-btn" onclick="switchTab('main')">主线相关</button>
            <button class="glass-btn" onclick="switchTab('love')">恋爱相关</button>
            <button class="glass-btn" onclick="switchTab('date')">约会相关</button>
            <button class="glass-btn" onclick="switchTab('quest')">委托相关</button>
            <button class="glass-btn" onclick="switchTab('fest')">节日相关</button>
        </nav>
        <div id="sub-nav" class="sub-nav"></div>
        <div class="content-window" id="display"></div>
    </div>

    <script>
        let userName = "";
        const introText = "看来我们栽培的神殿之花得以跨越时间长河，陪伴卡尔达鲁斯大人度过黑暗。感谢你所做的一切，这个时代的龙誓者大人......我是否能记下你的名字？";

        // --- 文本引擎核心 ---
        function format(text) {
            if(!text) return "";
            let res = text.replace(/\[Player\]/g, userName);
            
            // 保护特殊符号
            res = res.replace(/\$/g, '___HL___');
            res = res.replace(/\=/g, '___SP___');
            
            // 处理换行和玩家选项
            let lines = res.split('\n').map(line => {
                let l = line.trim();
                if(l.startsWith('-')) return `<span class="player-choice">${line}</span>`;
                return line;
            });
            res = lines.join('<br>');

            // 还原高亮
            res = res.replace(/___HL___([^___]+)___HL___/g, '<span class="highlight">$1</span>');
            res = res.replace(/___SP___([^___]+)___SP___/g, '<span class="special">$1</span>');
            
            return res;
        }

        // --- 打字机 ---
        function typeWriter(text, elementId, speed = 40) {
            const el = document.getElementById(elementId);
            let i = 0;
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    document.getElementById('input-area').style.display = 'flex';
                    setTimeout(() => document.getElementById('input-area').classList.add('show'), 10);
                }
            }
            type();
        }

        document.getElementById('name-input').addEventListener('input', (e) => {
            userName = e.target.value.trim();
            document.getElementById('enter-btn').disabled = (userName.length === 0);
        });

        function enterSite() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('main-content').style.display = 'block';
                const pc = document.getElementById('portrait-container');
                pc.className = 'portrait-main';
                document.getElementById('npc-img').src = 'npc-main.png'; 
                setTimeout(() => {
                    document.getElementById('main-content').style.opacity = '1';
                    switchTab('daily');
                }, 50);
            }, 1000);
        }

        // --- 数据加载 (此处包含了您提供的所有文本) ---
        const SITE_DATA = {
            daily: {
                subs: [{id:'s1', t:'雕像时期'}, {id:'s2', t:'深林修养时期'}, {id:'s3', t:'深林自由时期'}],
                s1: ["午好，[Player]。光阴如水，你是否把握好今日的每一缕清辉？", "[Player]，这一日过得好吗？", "忙碌之时，光阴似箭，转瞬即逝。", "[Player]，庄稼长势如何？", "晨曦已逝，金乌攀上天穹…", "今天的夕阳西沉定会再现一幅天地交融的绝美画卷。", "你驻足与我交谈，我心甚喜。\n但雪越下越大了，你能呆在室内好好取暖的话，我才会安心一些。", "（矿洞死亡）我知道你在矿洞里遭遇了不幸的事故。静养身心，不要气馁。你追寻的目标，本就少凡人能及。", "（矿洞死亡）[Player]，你是不是受伤了？或许你可以考虑下升级你的盔甲和武器。更好的装备能更好地保护你自己。", "（2AM前未睡觉晕倒）[Player]，你面色看起来不太好，今天请不要太过操劳了。", "（2AM前未睡觉晕倒）你是不是很累？一顿佳肴，应能抚慰倦怠的心灵。", "啊，又是个清爽如诗的秋日。", "我喜欢这个能欣赏落叶的季节。", "秋叶在午后阳光的怀抱中熠熠生辉…", "今天早上有点微凉。", "今天的风很温和，预计下午天气会回暖一些。", "嗯…清晨的秋意，沁人心脾。", "[Player]，夜晚冷气逼人，注意保暖。", "今晚预计还会降温…", "今晚似乎会很冷，记得给你的火炉添够柴薪。", "周五快乐，[Player]。你今晚会去旅馆跟大家聚聚吗？", "根据你给我的信息，听起来米斯特利亚在岁月间发生了巨大的变化…", "你领养了一只小动物？“领养动物”这个概念于我而言很是有趣。而且还专门给它建了房子？你的心肠真是太温柔善良了。", "我那个年代的人类有一句代代相传的话…\n怎么说来着？大概是“别忘记用跳跃键。”\n应该对人类来说比较有参考价值。希望对你有用。", "精力不足的话，可以“煮”点东西吃。\n人类通常是这样恢复力气的，对吧？", "这片土地如同一座取之不尽的宝库。务必四处探索，$采集$它为你准备的每一份馈赠。", "这儿的水域很丰盈。\n多去钓鱼、游泳和潜水吧，一定能得到很多资源。", "[Player]，感谢你供奉的精华素。\n来自地底的魔力愈发充盈，我感受到自身力量正在缓缓复苏。\n请继续供奉精华素吧，那样一来，我也能用恢复的力量回赠你各类技能。", "若我竭力回忆，似乎能忆起久远的往事，但最近几千年的记忆始终被笼罩在迷雾中…", "[Player]，谢谢你抽出时间陪我说话，我知道你为援助镇民而十分忙碌。", "你带来的精华素如涓涓细流，正在缓缓复苏我的力量——我也不禁唏嘘，自己竟变得如此微弱无力。", "“无聊”？我恐怕难以领会这种心境，也许这是只有人类才会有的烦恼。", "你今天在耕耘田地吗？培育大地，必得厚报。", "[Player]，不用为我过多忧心。龙本不朽，无论力量什么时候才恢复完整，我皆能以安然之心静待时机。", "看着你在农场里辛勤劳动，令我很想为你分担些工作。不过，我担心作为一条龙，一个不留神可能就会将你的农场夷为平地。", "我的生…日？嗯…我孵化于久远时代的一个春天，是我巢中最后一个破壳而出的幼龙。", "近来有只小鸟时常以我为栖，非常…可爱。虽然我希望它不要起意在我身上筑巢。", "夏日炎热，冬夜寒凉，我皆能感知。但你无须担心天气是否给我带来不适。龙族之尊，早已超脱于这些凡尘琐事之上。", "在这个新纪元醒来后，我见过的人类寥寥可数。你觉得自己具有代表性吗？\n-我只是个平平无奇的普通人而已啦！\n有趣的见解——若置身于上一纪元，你必定会是位超凡脱俗的人物。\n-当然，我那么优秀。\n我很认同。", "你想送我礼物？虽然心意甚是珍贵，但我现今的形态已无需尘世之物。", "你听闻龙族皆有珍宝之藏？我这么多年里确实收罗了不少物什…\n不过，传统意义上来说，应该不会有人觉得我收藏的东西是“宝物”。", "Zzz…噢！日安，[Player]。变成石像后，我似乎格外容易陷入小睡了。", "等我恢复力量了，一定要品尝你所说的这些令人垂涎的佳肴。=甜菜汤=！多新奇啊。", "米斯特利亚在我的年代曾是一片物产丰饶之地，很开心它依然如此。", "你说的这个=蒙布朗=听起来很好吃！在我那个时代，我还没听说过这种甜品。", "你在小镇周边看到了狮鹫雕像？狮鹫是高贵可敬的守护者。我怀念曾与它们一同翱翔天际的日子。", "想用精华素来换取哪些技能？你能看到的选项皆是你内心所渴望的。该怎么选，全凭你喜欢。", "[Player]，你的力量日渐精进了。", "无需急于一日求成，天地悠悠，时光广袤，你还有许多岁月可以挥洒。", "[Player]，这是来自一条活了上万年的龙的劝告：尽早学会活在今朝，生命便会越发丰盈。", "今天不如去做点新鲜事吧？米斯特利亚有太多值得探索和体验的地方。", "解锁技能能极大推进你的效率，多试试看吧。", "不要忘记花点时间和镇民社交。", "这里的居民看起来都很热情，我希望有一天能亲自见见她们。", "赛林听起来是个体贴又关心人的邻居。对于她的友善帮助，切记有来有往。", "海登对这片土地的热爱能引起我的共鸣。你定能从他身上学到很多，尽情与他交流学习吧。", "你说，你在搜寻文物？真没想到这个时代的人类竟会看重这类东西…", "啊…我还记得小镇海岸边的鱼有多美味！人类只能一条一条地钓，真是太可惜了。", "烹饪？嗯，除了用火烤熟食物外，我在此道上着实没有多少造诣…", "新鲜的空气总有一种抚慰人心的力量…", "观四季轮转之变化，甚是有益。\n细细参详，自能悟得诸多道理。", "[Player]，你的勤勉常令我感叹不已。\n你这份热忱，当真让人心生向往。", "我很感激你总是抽时间来与我交谈。\n你的善意令我动容。", "眼见米斯特利亚恢复得愈来愈好。\n我倍感欣慰。", "[Player]，你看上去很有活力。", "我今天可能会打个盹儿…", "[Player]，今天有什么雅趣安排吗？", "看云卷云舒，好不自在…", "[Player]，生活不应只有工作，也当寻些乐趣才是。", "[Player]，你在此布置的装饰非常好看。", "看着这片土地蓬勃发展，实在令人欣慰。\n感谢你在其中的付出。", "每当困难之时，请心怀希望。\n给时间一点耐心，阳光终会穿透乌云。", "河水潺潺，听来真舒神…", "小动物们嬉戏玩耍的样子，让我也心生愉悦。", "你在矿洞里遇到了$宝箱怪$，它只有在你率先攻击时才会反咬一口？真是奇妙。\n你是否考虑过…丢点什么给它吃，而非与之争斗？", "早安，[Player]。昨晚睡得好吗？", "多么美好的清晨啊，今天必定是个愉快的日子。", "一日伊始，今天也竭尽所能，创造美好的一天吧。", "我满怀期待，静候今日的时光将为我们带来什么惊喜。", "[Player]，每天一小步，慢慢来就好。\n不必急于求成。", "充足的睡眠至关重要。\n[Player]，希望你有好好睡觉。", "你在矿洞中见过会抵御你攻击的$蘑菇$怪物？\n唔，你需要$在它攻击你的前一刻果断出击$来解除它的防御。那是它最为脆弱的时机。\n当然，$跳跃攻击$或许也行得通…", "晚上好，[Player]。今天过得怎么样？", "今天是否很累了？务必好好休息。", "Zzzz…啊…抱歉，[Player]。我刚刚不小心睡着了。", "[Player]，用过晚饭了吗？记得好好吃饭。", "伴随着小生灵们的合唱，我享受这样宁静祥和的小镇夜晚。", "别让矿洞中的深坑阻碍你前进的步伐，[Player]。记住，你只需飞越过去便可。\n-我，呃，不会飞啊？\n啊，那对你而言真是极为不便。\n那，我相信$跳跃一下$也足够了。\n-你是说跳过去吗？\n啊，对的。\n飞行自然更为简便…不过，$跳跃$也足以应付了。", "雨滴落下的声音真让人心安…\n来吧[Player]。陪我站一会儿，一起听听这雨声。\n…………\n正是这样的时刻，让我觉得苏醒过来真好。", "雨天的独特之处，少不了它的润物无声，空灵静谧。", "暂未见雨将停的迹象。", "雨声听得我…有些昏昏沉沉。", "雨水来得正是时候，它让大地焕然一新。", "[Player]，别在雨中停留太久了，我不想你感冒。", "落叶被雨水打湿后散发的味道、木柴燃烧所弥漫的烟熏香气…\n多么美妙啊。", "偶尔下场雨对植物有益。", "这场雨真是热气腾腾的天气里一次清凉的喘息…\n你能听到吗？你的作物都为这场雨欢呼。", "你在矿洞中遇到了会向你投掷石块的$石头怪$？\n真是引人深思，看来渗入这个世界的魔力正在赋予无生命之物以灵性…\n-它们真的很难应付。\n石块向来如此坚硬。你最好$用你的剑将它们的投射物反弹回去$。\n-它们不成问题，我将它们的攻击反弹回去就好了。\n干得漂亮，我对你能力的信任果然没有错付。", "过去数不清的岁月里，你所说的流星雨每年都会划过天际。今夜，我也会在此独自欣赏这场天象。", "（流星节）昨晚的流星雨很美。\n流星在空中闪耀，仿佛遥远的龙焰。能再次亲眼目睹此景，我倍感愉悦。", "（流星节前）每年这个时候，流星雨都会如约而至。\n回顾漫长岁月，这是其中难得的恒常。我期待再次观赏这美丽的天象。", "今天很冷，[Player]。雪景很美，但也要注意保暖。", "春天的午后，和风轻拂，暖阳微醺。令人不觉昏昏欲睡…", "天气开始回暖了，真舒服。", "春日午后，晴空万里。", "尽管有许多往事已不复记忆…但大地回春、万物复苏的春天气息，怎能忘怀。", "$春息花$？$会掉落精华素的地方$，也会有春息花。龙的吐息触及大地，春息花由此诞生…我很高兴得知人类仍喜爱它。", "嫩芽一夜之间从土壤里冒头，这景象总是那么让人振奋。", "花儿似在春天里最为欢欣。", "清晨的露珠何尝不是一种大地的嫩芽？", "[Player]，你今天格外劳累，请务必好好歇息。", "春夜里蟋蟀格外活跃。你也喜欢听它们的小曲儿吗？", "尽管春天是万物蓄势待发的季节，也请别太勉强自己。", "感受到了吗？春风拂面…风还带来了芬芳的花香，真令人愉悦。", "今日有暖风徐来，拂面如春…", "和熙的微风吹来零碎几片花瓣，这样的春日再美不过了。", "今天的雨比往常更清寒了。不久之后，这些风雨将化作纷飞的雪暴，席卷大地。", "今早我被雷声吵醒了。雷声听起来很像龙吼，觉不觉得？", "[Player]，雨是夜里开始下的，并且雨势还在加重。今天最好还是呆在室内。", "午后的太阳可真毒辣…", "我觉得最适配夏日午后的活动，就是沙滩边的玩乐。", "身旁有给我们遮荫的树真是太好了。", "今天预计也是炎热的一天，若是可能，尽早完成你的工作吧。", "今天似乎会很闷热…", "[Player]，天气炎热，记得多补充水分。", "多么宜人的夏夜啊。", "天儿终于凉爽一些了…", "在暑气逼人的日子里干活会比平常消耗更多体力，所以今晚一定要早点休息。", "我很想念这样的晴天…即使现在是石像之身，我依然享受温暖的阳光。", "我喜欢看秋天层林尽染，叠翠流金。春去秋来，又逢一载。正是悠然的好时节，不是吗？", "天气越来越热了…注意多休息，多补水。", "季节变换，景象更替。我敢肯定，很快就能看到镇上的孩子们堆雪龙了。", "听起来艾德林这个人十分英明果敢。像她这样付出真心、关爱身边人的人很难得一见。", "我得承认，我跟商人打交道不多，所以无法帮你分辨贝勒是否值得信赖。毕竟，龙不需要做“买卖”。", "你说达西擅长用苦苦的豆子做各种饮品？并且大家…都觉得很好喝？这个时代可真有趣。", "在我看来戴尔是当骑士的好料子。只不过…如今的王国还有骑士吗？", "你说的这个好孩子困困，听起来有高贵纯净的灵魂，我很想见一见。", "在艾兰德的帮助下我的祭坛才得以重见天日。等时机来临，我一定得亲自跟他道谢。", "艾尔西听起来是个活力四射，懂得尽情享受生活的人。你可以从她身上学到很多。", "听起来埃罗尔是个适合一起回忆往昔的好听众，或许他能帮我唤起一些记忆。", "你说，赫姆洛克品酒酿酒都很在行？嗯…说得我也想品尝下他酿的酒。", "抱歉，是我哪里没跟上？你说的姬丽塔，原来是只鸡？它听起来真像个人。", "霍特喜欢“玩双关”？在我那个年代，这种行为几乎是犯罪。", "乔瑟芬开的旅馆叫“沉睡之龙”…这个名字我很在意。是不是她们家祖先还记得我呢？", "所以朱尼珀是一家澡堂的店主，她家的浴池有恢复生命值和精力的效用？听起来更像魔法一点。", "虽然你跟我说了一些关于兰登的事情，但我还是很难理解你说他“退休”了，这个“退休”是什么东西？", "路易斯是裁缝？有趣。我很好奇如今的时尚已如何演变。", "你真好，愿意帮卢克抓虫子。如果我有看到比较特殊的虫子，也会跟你说一声的。", "小枫想成为下一代女王？这个名头实在有太多人虎视眈眈，她的前路必定充满荆棘。", "说来也怪，马奇因出色的能力而久负盛名，又因其个性恶名昭著。下次见面时，你不妨拿这事打趣打趣他？", "周六市集上诺拉组织举办的？值得称赞，太厉害了。", "听起来奥瑞克是个值得信赖的好伙伴。[Player]，同样的，你也应当不负他的信任。", "听你说的，雷娜的烹饪确实很令人垂涎欲滴。龙无需依靠进食来维持基本的机能，不过，谁能拒绝美食呢。", "我常能从这儿听到你提过的那位木匠瑞斯忙于木工的声音。看来，凡人所造之物，总难逃损坏的命运。", "听起来，我跟泰瑞西亚会有很多共同话题。有机会的话，我想跟她聊一聊海里那些美味的鱼。", "龙很少会生病。听闻你们有瓦伦医生能照料病弱，我就放心了。", "你的发型是维拉帮你剪的？有趣。我好奇她会给我推荐什么造型。", "今天早上，我看见几只小鸟在雪中玩闹，甚是可爱…", "木柴炉燃烧的馨香，早已成为我心中独属于米斯特利亚独特的冬日印记。", "今天太阳暖洋洋的，为我们分担了一些风吹来的寒冷。", "这个时辰的雪景格外动人。", "今天似乎也会很冷…", "[Player]，有在好好保暖吗？用一杯热饮来开启新的一天也很不错。", "[Player]，小心点走路，地上滑。", "寂静的冬日夜…", "[Player]，家里的毯子够用吗？今晚会很冷，裹严实一些以御寒意。" ],
                s2: [ "变成人形后，嘴巴比以前小得多了。这样就能细嚼慢咽，细细品尝美食的滋味了。\n我很是喜欢这种体验。", "在我如今面临的所有困难中，烹饪恐怕是最艰巨的。每日总有令人谦卑的新教训。\n譬如今天，我领教了烧糊的东西在此形态下不甚可口。", "每当我享用大自然的馈赠时，我都心怀感恩。我以前也总是如此吗？实在是难以忆起了。", "这片森林里的浆果，有时甜美，有时酸涩。\n着实有趣，对吧？\n啊，原来并不。我明白了。", "常言说熟悉的味道能唤起记忆，恰好龙的味觉特别敏锐。\n最近我一直用杵和臼把能找到的东西都磨成粉，然后一一品尝。\n虽说目前还没唤起什么记忆，但好消息是我的香料柜日渐丰富了。", "我现在主要吃些简单的食物，毕竟还在适应这个形态…不过我很好奇在我沉睡的这段时间里，烹饪艺术发生了怎样的变化。\n时间的流逝带来新的文化，而新的文化必然催生新的食物。", "我正准备做些料理，却发现很难生火。\n对于龙来说，引火本是易如反掌的事。这事着实让我感到羞愧。", "我记得曾经喜欢生吃捕捉到的鱼，丝毫不想什么烹饪。\n如今，我却发现自己渴望学习现代社会的烹饪方式，进行不同的料理。", "唉，烹饪为何不是种本能呢。\n若是天生就会，我也不至于遇到这么多麻烦了。", "对于龙来说，一顿饱腹不过是找到食物、然后喷一下火。\n而现在，我需要努力适应一下…洗碗这件事情。", "我喜欢凝视炉火，进行冥想。希望这种修行能唤醒一些我失去的记忆。", "欢迎，[Player]。很高兴你来做客，只可惜我没什么好东西能拿来招待你。\n我该再去采集一些食物了…", "我以前从不需要刀具和切菜板这类厨房用具。\n毕竟过去，牙齿和利爪就能完全满足我的需求。", "啊，[Player]…能不能向你请教一些烹饪技巧呢？\n不知为何我烤的蛋糕总是不膨胀。", "我正在练习的菜肴还远不到能拿来招待人的水平，不过确确实实在进步了。\n说不定很久以后…我还能出一本自己的食谱！", "今天我才知道不是所有东西都是越多越好的，比如说下盐…原想请你尝尝我做的菜，但…这个苦果还是由我自己来吃吧。", "旅馆那位厨师，叫雷娜？现在我对她的厨艺有了新的认知和欣赏。小小年纪就如此有造诣，实在令我佩服。", "[Player]，听我一言。原来对于我现在这个形态，并不是所有野生植物都“可食用”。从今往后我得小心些了。", "适应新形态的生活需要时间和努力。目前看来，我不是在吃…就是在准备食物、料理食物和收拾干净的路上。", "我感觉到饿了才会去觅食，然后还没采集够，就饿得很虚弱了。看来，每日的餐食是需要提前去计划和准备的。", "看来我神殿里的雕像与你农场里的那座有某种联系。虽然我目前力量不足以使用，但我相信你可以用它们来进行空间传送。如果你有时间来访，这个功能想必很有用。", "以前我听说过人类会“踢到脚趾”…现在我自己经历过了，可以很明确地说，这确实不太愉快。", "这座神殿是直接从岩石中凿出来进行修建的，建成后又根据我的喜好放满了舒适的家具。人类所有心灵手巧的制品中，我最享受纺织物带来的愉悦。它们真是令人舒适至极。", "我曾经不懂人类将叶子煮沸的意义是什么。但事实证明，在寒冷的日子里喝一杯热茶确实能令人重振精气神。", "我许久没见过大海了。如今海水还是咸的吗？非常咸？啊，真好。那我就放心了。", "加热食物，就能完全改变食物的味道，真神奇啊。", "我观察到有镇民用纸包着一个方块，然后送出去给人做生日礼物。这是现在寻常的习俗吗？那层纸有什么特殊的含义吗？ 还是说意义在于那个盒子？", "很遗憾，龙角使得我无法戴上你们做的那些可爱的帽子。", "我相当喜欢在深林中寻觅野生食材，但我的口袋总是不够用。", "坦白说，我还没习惯失去了黑暗中的视力。不过幸好，用灯光来装点家里也挺不错。", "梳头发花费的时间出奇地长。我最近开始用松枝代替我的爪子来梳头发，这样快多了！而且气味也很好闻。", "希望有一天我能去你说的这个周六市集逛逛。欣赏过你各式各样的装束之后，我对当代服饰产生了好奇心。", "记忆仍如雾蒙，万幸的是我的手指还记得怎么弹奏鲁特琴。", "[Player]，你不冷吗？我不禁怀念龙形态时，体内的生命之火。如今取了凡人之形，无处不受自然的牵制。", "我没想到以人类形态生活是如此容易受到天气的影响，我得格外注意保暖了。别担心，我现在穿了这么多层，还是挺暖和的。", "龙是独居生物。如果我们像人类一样容易受到寒冷和风雨的影响，或许我们也会像人类一样寻求陪伴。因为如今身为凡人之躯，我竟渴望陪伴带来的温暖。", "我有时候想，变成这个形态时要不要保留我的翅膀…但翅膀又会阻碍我躺着睡觉。", "在人类众多的发明中，编织是我最喜欢的之一。如此精细的工艺，成果又如此美丽。在我看来，地毯或毯子这类东西永远不嫌多。", "环顾家里，我不禁思考…到底多少地毯才算太多呢？", "我一直想试试人类特有的习惯——穿袜子。可惜，很明显如果我亲身试穿，袜子会被爪子弄烂。", "驯养家畜的做法听起来很耐人寻味。人与走兽彼此依存，相互依赖。说不定有天我也会尝试养一些家畜。", "过去，我从没在意过我的爪子。但现在，这些小事变得重要起来。", "[Player]，出于好奇。如果你不介意的话，我能不能看看你的手？嗯，确实跟我的很不一样。你的手既柔软，又温暖。", "我变成人形后没想到会比一般人类高这么多。希望我的身高不会让你感到不安。", "尾巴对于平衡来说极其重要。在这件事上，人类一直让我觉得疑惑。没有尾巴，行动不会很困难吗？", "不知为何，近来我的情感变得更加丰富、浓郁。对一顿即将出炉的美食的那份期待、展开卷轴前的那份好奇、等待你下次到访时的那份雀跃。这些感受对我而言都如此新奇。", "变身时我从未想到，头发竟需要如此多的精心照料。作为龙时，根本无需顾虑这些琐事。我倒是欣赏过祭司们那飘逸的秀发，她们的优雅仿佛与生俱来，毫不费力。从未有哪位祭司踏入神殿时，发间还缠着落叶。", "对一条龙来说，在溪流中沐浴再自然不过，但水比我记忆中的要冷。有朝一日，能去你所说的澡堂体验一番想必很不错。如今，热水浴对我有着莫大的吸引力。", "自我醒来后，观察到镇上很多人都在喝一种饮料，是用被火烤黑的豆子做的。人们称之为…$咖啡$。我匿名托贝勒代为购入一袋咖啡粉，今早冲泡来尝了尝。不过，我可能用量过多了。除非，你也觉得房间在震…？", "那段时间，看着你农场里的作物如此欢快地生长…使得我也想亲手培育一片属于自己的绿意。", "你好啊，[Player]。我在和这些小家伙们交流呢。它们长得很好。", "通过亲手翻土、准备播种…我想，我又多了解你了一些。", "无论四季如何更替，大地都慷慨地赐予我们丰收，这真是自然的恩赐。", "贝勒能完成我的众多委托之一，帮我拿到一把铲子真是太好了。这工具比我的爪子好用多了。", "与你循规蹈矩地浇水不同…我倾听植物的低语，在它们需要的时候应其所求。", "深林里的古木，早已在岁月长河里赢得了对养分与阳光的优先权。它们对养分的争夺，让我的园艺工作成为智慧与耐心的考验。然而，正是这份与自然力量共舞的挑战，赋予了林间耕作别样的诗意与乐趣。", "[Player]，不知深林与你农场里的土壤有何不同。我很想一探究竟。或许命运有天会眷顾，让我有缘在你那儿播种些什么。最好，就种在我那座雕像旁边。", "你在深林里看见过$钟铃浆果$吗？如果你喜甜，你会很喜欢它们。", "这片森林之中，时而可见$龙角甲虫$的踪迹。不过别误会，它们不是真的龙。", "你见过$尘光萤$吗？传说若有旅人在森林里迷了路，它们会在危急关头出现，为迷途者指引方向。", "在这片林中，$林歌叶虫$的声音实属罕见，所以我常随身携带我的鲁特琴。毕竟，谁也不知道合唱的契机何时会降临。", "你采过$灵菇$了吗？它们异样美丽，还可以用来泡制一种宜人的灵菇茶。", "从前，深林盛开的$神殿之花$深得祭司们钟爱，她们将这些灵性之花环绕神殿栽种。如今看见这些花儿穿越时间的长河，仍然绽放着生命的华彩，心中倍感欣慰。", "[Player]，采摘$荆棘藤$时务必要小心一些。我用我的爪子都很难处理上面的尖刺。", "深林里长了不少$核桃$\n有需要的话，我很乐意帮你敲核桃。", "$安魂树园$静卧于这里西边的不远处。那里承载着一个古老的传统。每当有人离世，人们便在其安眠之地种下新树，并将刻有姓名的石碑依附于幼苗之上。随岁月流转，树木成长，石碑亦随之升腾。如同树木向天际伸展，逝者的灵魂亦踏上通往新生的旅途。", "这些陈旧的卷轴…看来这些龙祭司，是极为勤勉的记录者。我深感感激。希望通过阅读，能拼凑起记忆中的空缺。", "我正在阅读的卷轴记载了这座神殿的渊源。“在阿尔达文明之前的一个远古种族，曾于黑暗时代降临前建造了这座神殿的外部结构。而洞穴本身，却是比那些石墙更为古老的造物。”我对这里提到的“黑暗时代”并不熟悉。或许是我漏看了…？", "这些古老卷轴为我提供了许多历史信息。据记载，“阿尔达文明”是由黑暗时代末期，由分崩离析的部族重新汇聚而成的。奇异的是，我在卷轴中找不到任何关于其女王、国王或任何贵族阶层的相关记载。而在我那如薄雾般飘渺的记忆深处，人类部落似乎曾由女王统治…这如谜团般的历史断层，引人深思。", "[Player]！我终于发掘到了至关重要的信息。我终于找到了一张卷轴，里面提到了黑暗时代前统治人类部落的女王们。我陷入沉眠的时间线终于有了线索…我心中有着许多疑问，世间究竟发生了什么？", "引人入胜…“众所周知，卡尔多西亚人和阿尔达里亚人有着共同的祖先。”卡尔多西亚人…以及阿尔达里亚人。一定是在我的时代，居住于此并信仰于我的信徒之后裔。然而后来，其中一部分人东渡远方，建立了卡尔多西亚帝国，而剩下的人留居于此，逐渐建立阿尔达里亚文明。究竟是什么促使了这一分化？啊…我的头开始隐隐作痛了。今天就先读到这里吧。", "你来了，[Player]。我今日思绪难以凝聚。昨夜，一段记忆片段在我心海浮现。那景象宛如幻象——赤红的烈焰，血色的双眸…又或许只是一场梦而已。", "你来了，[Player]。我今日思绪难以凝聚。", "（卡尔达鲁斯似乎沉醉于他的乐章之中，此刻打扰他恐怕不妥。）", "（卡尔达鲁斯的手爪在琴弦间灵巧舞动，令人着迷。）", "（卡尔达鲁斯弹奏的音乐对你而言全然陌生，它与你听过的任何音乐都不同。）", "（卡尔达鲁斯手中的鲁特琴保存得极为完好，显然备受珍爱。它的样式与赫姆洛克的截然不同，琴身的木材你从未见过。）", "（卡尔达鲁斯指下流淌的旋律蕴含着一种深不可测的忧伤，在这样的氛围中，实在难以寻得一个恰当的时机打断他…）", "（卡尔达鲁斯指间轻弹出欢快的音符。他很是沉浸其中…眼下最好别打断他的雅兴。）", "（卡尔达鲁斯眼帘低垂，专注地凝视着手中的鲁特琴。他的目光随着手爪在琴弦间的的舞动而游移。）", "如今在晨间打理利爪、长尾与龙角颇费工夫。不过能保持得体的仪容终究是件乐事，尤其是在当了那么久的石像之后！", "林间生灵繁息，充满生机…观察千姿百态的生命不失为一种乐趣。", "这里的光线美得妙不可言。", "林间虫鸣的夜曲…恰是故乡的低语。", "今日空气中弥漫着一缕草本芬芳，闻起来是不错的调味料味道。我应该去采集一些。", "这片树林里栖息着不少小鸟，种类繁多。我曾经一定熟知它们的名字。等我恢复得差不多了，就向那位年轻的木匠请教一下这些生灵在当代的称谓。", "你在深林里采集过野生植物了吗？其中大多数都仅仅生长在这里，在米斯特利亚其他地方是找不到的。", "无论何时聆听鸟儿吟唱，都令我心神怡然。如果我以琴弦重现它们的歌谣，不知它们会有什么反应呢？", "树是值得敬佩的壮丽造物。它静默而谦卑地生长，直至高耸于万物之上。如果一颗树命途短促，其躯干枝叶皆为伐木者所用；如果一颗树寿终正寝，则化为养分，哺育后世生灵。", "害怕腐朽是很自然的，但腐朽本身也符合自然之理。世间万物都是从前者之躯中生长出来的。", "你试过在云海之上看日出吗？那景象当真美不胜收。", "我虽遗忘了许多，这些松树对我来说却很熟悉。竟在松树上找到这样的慰藉，真是奇妙。", "那拂过枝叶间的清风，如此轻柔地低语着…乐符能否抓住它的灵韵呢？", "深入幽林之中，树上的枝叶相连交织成天然的穹顶。它看似密不透风，然而金色的阳光总能找到缝隙，投下斑驳的光影。光明总会寻得其路，穿透看似无隙的遮蔽。", "与你交谈，如同为我飘摇的思绪寻得一处停泊的港湾，让我得以安然立足于此刻、此地。谢谢你来看我。", "林间漫步，益处良多。步履之间，你的内心深处与周遭万物重新建立那微妙而深刻的联结。", "[Player]，你有没有好好吃饭？你精心培育的水果和蔬菜肯定也想回报你的关爱。", "今天问候过同伴了吗？维系与珍视之人间的纽带是重要之事。", "即使龙很强壮，也需要敬畏四季变换。龙并非凌驾于万物之上，自然的力量才是超越世间万物的存在。", "取于自然，必当心怀敬意归还于她。当下或许不见其患，然随着人类文明的扩张，终有一日会超越大地母亲自我修复之能力。", "大自然亲身教导我们的众多事情中，其中尤为珍贵的，莫过于面对磨难时的不屈韧性。我仍在努力内化这一课。", "耕耘大地之举，蕴含着一种难以言表的美妙。", "面对古老箴言，须保持审慎之心，不可尽信而照单全收。岁月流转，切记尊古而不泥古。", "许久以前，龙祭司们为造出能抵御时光侵蚀的羊皮纸费尽心力。龙的记忆绵长如山河，因此我当时不解，何需外物记载？然而如今，我对她们的先见之明满怀感激之情。", "这些卷轴中有许多在边缘处绘有插图，然而这些墨迹仅对龙族之眼可见。若能与你分享这些奇妙图景就好了…有些画着实令人捧腹。", "想必是龙祭司们一直维持着这卷轴宝库的秩序井然，因我在这方面确实无可救药。要是我这般随意的摆放被她们看到，定会严厉斥责。", "这些古卷中蕴藏着大量信息，使得我愈发好奇，渴望了解我沉眠期间世间的变迁。有机会的话，我很想去你们博物馆的档案室看看。", "我向你保证，我平常没有这么乱糟糟的。只是卷轴实在是太难整理了。", "我大部分的阅读时间都花在记载历史的卷轴上。等读得差不多了，我必须抽时间品读一些当代的作品。", "[Player]，你穿得够不够？请不要因为我而在这里着凉。", "秋林红橙之色，令我联想起龙焰腾空之景。", "大地在沉眠前正披上美丽的彩衣。希望你与我一样，尽情欣赏这场自然的盛大告别。", "凉爽的天气让人想要一杯热饮。我泡些茶吧。", "春风拂过嫩枝芽…没有比这更好的景象了。", "春日，万象更新之时。或许我该开始阅读那部一直搁置的专著了。", "漫长冬日之后，春天的葱茏绿意令人神清气爽。我总是格外期待它的到来。", "春日的暖意渐涌，我特别钟爱这个季节。而且，这是我出生的时节。", "今天非常湿热…但愿明天能清爽宜人些。", "林间树荫蔽日，比别处要来得清凉一些。你需要暂避盛夏炎热的话，随时欢迎造访。", "日光分外强烈，你说是吧？好热，即便对我这样的龙族也颇为考验。", "这个季节的昆虫变得相当健谈，几乎与植物的窃窃私语一样热闹。它们一定都很享受夏夜的温暖。", "今天很冷，[Player]。希望你没有勉强自己，为了我受着严寒从大老远过来。不过既然你已经来了，就请到火炉边暖一暖，当作在家一样舒服地待会儿吧。", "雪覆深林，宛若仙境…我确实对这般氛围情有独钟。", "换上了雪装，深林似乎变成了另一番天地。来探险的时候，千万不要迷路了呀。", "你家够暖和吗？任何时候，只要你想避避风霜雪雨，尽管来我家，不要客气。", "看来，即使在我沉睡之际，龙祭司们依然坚持定期清洁擦拭这尊雕像。如今，该由我来延续她们的这份虔诚工作了。", "为这尊雕像挂上新编织的花环，总能带给我由衷的喜悦。", "我初醒时，此座神殿尘埃满布。因此，我的清洁规划落实得很用功。", "这尊雕像前身是一块被龙祭司偶然发现的龙形岩石。数代祭司接力雕琢，渐渐塑造出我的形貌。因此，它于我心中有着非比寻常的珍贵意义。", "我在修剪花环上凋萎的花瓣。我习惯将它们收集起来，等到积攒足量后制成熏香。", "你今晚要去旅馆跟邻里们聚聚吗？有机会的话我也想参与看看，听起来就很热闹。", "我很赞赏那位名为贝勒的商人。他行事谨慎，同时懂得尊重别人的隐私。我的订单放在连通镇上的阶梯旁，虽然不同寻常，他仍然愿意接下我的委托。对我日渐减少的食物储备来说，是件好事。", "早些时候我看到赛林在池塘边采集。她差点就掉池塘里了，我没忍住施了个风系魔法扶她站稳…", "那个叫戴尔的孩子，真叫人忍俊不禁。她坚信这片林中栖居着一条龙。同时，她也深信这里还住着一位无头骑士、一只狮鹫和一条美人鱼。看来我得多加留意了。", "那位年轻的艾兰德少爷对龙誓者的历史似乎颇为着迷。我很好奇，当他发现自己身边就有一位龙誓者时，会是什么反应。", "艾尔西夫人与她的浩瀚藏书，我也有所耳闻。希望有机会探索她那渊博的知识宝库，我深信定会受益良多。", "前几日我遇到了一件趣事。当时朱尼珀似乎是追随着灵脉进入了深林。但后来她丢失了灵脉的踪迹，我情不自禁地给了她一点提示。不过由于我隐藏着身形，突然出现的陌生声音想必吓到她了。她的尖叫惊动了深林中的每一只鸟儿。每一只鸟儿…以及一条龙。", "姬丽塔听起来是个自豪而高贵的小生物，我很乐意与这位羽族女士会晤一叙。", "那位年轻的木匠瑞斯，近来造访深林，收集落下的树枝。他在这里相当自在，对小鸟们尤为着迷。那些小鸟也丝毫不惧怕他，从他手里取食。自那以后，我都帮他收集木材，成捆留在深林里，好让他能有更多在林间的放松一刻。", "我对周六市集上那位发型师维拉很是好奇。你说，我换个发型如何呢？", "这春风携花瓣翩跹而舞…仿佛施了魔法一般。", "古时的诗人常写诗歌颂飞舞的樱花。时代变迁，此景仍在，如今的诗人是否还同样动容？", "米斯特利亚的春光令人陶醉。为了让这样的美景年年往复，我时刻警醒自己爱护自然。", "这样阳光明媚的日子，我会花上好些时间来观赏林间的树影婆娑，光斑流动。", "你会不会也想在这样好的日子小憩一下？这诱惑着实难以抵挡啊…", "好天气真能提振心气。", "万里晴空，美不胜收。", "雨水的洗刷让万物都散发出青翠的气息…我很喜欢。", "雨滴落在树梢上那轻柔的敲击声…如同自然谱写的安眠曲。", "这场雨让大地重获新生。", "幸好我不再是风雪中的一尊石像了。以我现在的形态，再顶着一头雪就不好了。", "似乎每一片雪花都是独特的。但它们很狡猾，每当我想去仔细看看它们的纹理，它们便立刻融化，从指间溜走了。", "好漂亮的雪景。不知为何，心中生出了堆一只雪龙的念头。", "[Player]，不要在暴雨中久留。凡人的身躯有些脆弱，一定要好好珍视你的身体。", "暴雨天千万小心雷电。虽然这话更应该跟翱翔天际的龙说…", "这狂风暴雨…今天的天空露出了獠牙。", "天气如此恶劣，你还前来拜访，十分感谢。这雨似乎无意停歇，回去的时候也要小心。" ],
                s3: ["每当承蒙自然馈赠，我总会心存感谢。我始终坚持这一点。", "龙族的舌头其实格外敏锐…所有我能找到的东西，我都会用杵和臼细细研磨，再逐一品尝。我发现，某些味道似乎能唤醒一些原本无从触及的旧日记忆。", "能够再度造访大海真是让人喜悦。咸湿的海风、海浪轻柔地拍打着岸边，它们一如往昔，我真是松了口气。", "我注意到，人们有时会在生日收到一个以纸包裹的盒子，以示庆贺。这是现在寻常的习俗吗？那层纸有什么特殊的含义吗？ 还是说意义在于那个盒子？", "下周我想到周六市集上逛逛。悠悠闲闲地一个摊位一个摊位看过去，应该颇为惬意。", "龙族向来独来独往。不过…自化为人形以来，我发现自己越来越享受与人相伴的温暖。", "在溪流中沐浴，对龙族而言本是寻常之事，只是现在看来，溪水未免太凉了些…热水浴就惬意得多了。如今能随心欲地去浴所，我心存感激。", "自我醒来后，观察到镇上很多人都在喝一种饮料，是用被火烤黑的豆子做的。人们称之为…$咖啡$。今早，我用自己买来的咖啡粉冲泡了一杯咖啡。不过，我可能用量过多了。除非，你也觉得房间在震…？", "（杂货店）我在一本古籍中偶然看到一道颇为有趣的食谱…我想照着来做，奈何字迹已因年代久远、水渍侵蚀而模糊难辨。你说，它上面写的是两勺糖，还是两袋？保险起见，那就用两袋吧。", "（杂货店）我和瑞斯谈到烘焙的时候，他总说这是一门精确的科学。分量、温度、时机，都要把握准。然而与雷娜聊起烹饪，她却说这是一种创造性的探索，不分什么对错。俩人像是不同流派的哲学家一般，我应当从二者身上各有所得。", "（杂货店）能够自己走到杂货铺，买到当下所需之物，真是妙不可言。我对贝勒存深深的感激与敬意…我在深林那段时间，是他替我打点一切订购事宜…但如果有人突然想烤饼干，那就得立刻买到$巧克力$，一刻也耽误不得。", "（安魂树园）米斯特利亚人世代相传着一种习俗，将墓碑系于幼树之上。岁月流转，树木生长，墓碑也随之被托举向天。久而久之，墓碑便高过了常人目力所及之处。瓦伦医生父亲的墓，便是如此。再过些时日，连我也将无法读清那碑上的铭文了。", "（安魂树园）海登那位传奇般的奶奶，长眠于此林之中。奇妙的是，我们虽素未谋面，我却对她知之甚详。是啊，她从未真正离去。她还在海登的家里、在他的举止里，她造就了我们所知的海登。", "（安魂树园）安魂树园向来是一处静谧沉思的地方。而到了冬日，积雪将一切声响都悄悄抹去…那寂静便愈发深沉，无声无形地漫了过来。恍若轻触。", "（安魂树园）啊，[Player]…你也来欣赏这树林的冬装吗？这些高耸的松树戴上白雪，有一种独绝的美。", "我幼时曾听闻一些传说，说的是远古的骇鸟，那种巨兽庞然而凶猛，毫无防备的幼龙将会难逃其爪。看着姬丽塔…我不禁想起了这些故事。", "海登家的姬丽塔，似乎比其它的小鸡都要灵慧…不过她的幽默风格颇为刻薄。但愿她随着年岁渐长，能学会收敛几分。", "（甜水农场）这农场南边的雕像里，流淌着一股古老的魔力…爱确实是一种古老而长久的魔法。", "海登十分殷勤亲切地接待了我的造访。看他照料动物，心里便觉得很平静。每次告别，他都不忘备上一顿家常饭食送我离去。不知道，他是不是也把我当成了一只需要照看的动物…", "这些陈旧的卷轴…龙祭司们真是勤勉的记录者。我深感感激。阅读这些记录，帮助我将自己沉眠期间所发生的事拼凑了起来。", "我正在阅读的卷轴记载了这座神殿的渊源。“在阿尔达文明之前的一个远古种族，曾于黑暗时代降临前建造了这座神殿的外部结构。而洞穴本身，却是比那些石墙更为古老的造物。”我如今明白了，那段被称为\"黑暗时代\"的岁月，正是由我封印瑟礼蒂亚所引发的。读来并不令人愉快，但理解自己行为所带来的意外后果，终究是有益于未来的…", "这些古老的卷轴，让我获益良多。我了解到，“阿尔达文明”是由黑暗时代末期，由分崩离析的部族重新汇聚而成的。那些四散的部族，正是曾受尚未被封印的瑟礼蒂亚统治的平民百姓。当魔力消失，贵族阶层随之崩塌。瑟礼蒂亚的廷臣们向东出走，寻觅我的踪迹，意图缔结新的龙族契约，以重振昔日权柄。或许正因如此，东方那片土地才逐渐成为卡尔多西亚帝国。然而，卷轴虽解了我一个疑惑，却又引出了更多问题。", "所有的碎片，正在慢慢拼合…“卡尔多西亚人与阿尔达里亚人，拥有共同的先祖。”卡尔多西亚人…和阿尔达里亚人…就是那些在瑟礼蒂亚统治期间，曾在此地生活、虔诚礼拜的人们的后裔。平民留守此地，最终孕育出了阿尔达里亚。贵族们则扬帆东渡，建立了日后的卡尔多西亚帝国。那些贵族在此之前对魔法的依赖已入骨髓，教人不禁想知道，她们究竟是如何熬过那样严峻的旅途的。啊，头开始有些发胀了。今日的阅读就到此为止吧。", "（庄园）侍奉花草土地的人，总会在草木间留下自己的印记…只消一眼，就知道这片园子是赛林在打理。", "（庄园）虽然我更偏爱自然的野性姿态，但不得不承认，这座花园太过美丽。也许之后，我可以帮赛林一同打理它们。", "（庄园）这庄园着实气派。这里至少容得下两头巨龙，而且还绰绰有余。", "矿洞深处的$熔岩洞穴$…你的$浇水壶$应当能在那些$熔浆$上派上用场。当然，我授予你的$唤雨术$也是一个选择！", "（博物馆）走过这些长廊，我愈发清晰地意识到在我沉睡的时候，流逝了多少时光…在某种意义上，这…并不好受。", "我沉睡之际，凡人们成就了许多。人类的聪慧，每每令我欣喜，却并不令我意外。我知道在许多方面，人类都有创造伟业的能力。", "艾兰德和埃罗尔为这座博物馆积累了一批令人叹为观止的藏品。乍一看，甚至与瑟礼蒂亚的宝库都相差无几…然而，他们的心意，让这座无主的宝藏染上了阶年的色彩。", "这片树林里栖息着不少小鸟，种类繁多。其中许多，我只知晓它们古时的名字。现今的名称，还得向瑞斯这位年轻人请教了。", "在我的记忆迟钝不已之时，这些松树依旧熟悉如故。听起来或许有些奇异，但在那段时间里，它们给了我莫大的慰藉。", "与米斯特利亚的镇民们相处，比我预想的要容易许多。她们似乎很擅长接纳新常态，尽管我的…外形颇为特殊。或许一条龙的存在之所以不足为奇，是因为我沉睡之际，人们已在某种程度上感知到了我的气息。", "因着苏醒之初的种种际遇，我渐渐习惯了深林中的独居。然而如今，我已可以来去自如，享受人群的陪伴…独处的时光，反倒变得更加甘甜，也更有了几分意义。", "许多新邻居都盛情相邀，请我登门做客。她们甚至坚持在桌旁为我留出一席之地。这份款待，我将久久难以忘怀…更遑论她们让我不必忍受自己手艺的这份馈赠了。", "你暖和吗，[Player]？无论何时，只要你想避避风寒，我的神殿随时欢迎你。" ]
            },
            multi: { content: [
                { title: "贝勒、卡尔达鲁斯、艾尔西", dialogues: "1.于旅馆\n卡尔达鲁斯，这家店的名字叫沉睡之龙旅馆，我们很好奇…\n是以你为名吗…？\n你们觉得是？我相信并非如此。\n若是真的…如今我已苏醒，名字需要改改吗？\n那就有点可惜了，苏醒之龙旅馆，听着就没那个味儿。\n\n2. 于旅馆\n这里的菜品真美味，色香俱全！\n我做的菜，多半都是暗淡色调。\n真…的？\n卡尔达鲁斯，细说一下。\n嗯，该如何形容呢…\n凡人的语言里，有词汇能形容烧焦食物的颜色吗？\n或许我可以造一个。能在历史上留下我的印记，倒也不错。\n\n3. 于旅馆\n我还没见过谁见到食物觉得这么新奇的。我盘子里的你随便吃，卡尔达鲁斯。\n我的也随便吃！来，别客气！\n那也请让我分享我的食物吧。\n这番场景让我想起了一些往事…我神殿里的祭司们，也常常一同聚餐。\n这个回忆听着就开心。卡尔达鲁斯，让我们为旧友举杯。\n干杯！\n干杯！\n\n4. 于贝勒马车旁\n贝勒，我决定要学习谈判的艺术，而我想不到比你更合适的老师了。\n你有什么心得可以分享吗？\n懂得先出价的才是好商人，这样能率先给谈判定下基调。\n我在上流社会也领会过不少次。掌握谈话的主动权，是个细微却有力的手段。\n原来如此。那作为练习，我来给你店里的纤维出个价吧，贝勒。我出…两颗钻石！\n啊！\n我们还是从基础开始学起吧…\n\n5. 于贝勒马车旁\n来买东西吗，卡尔达鲁斯？\n是的。当初我在深林休养时，贝勒好心接下了我的匿名订单，从不多问。\n看来他为自己赢得了一位忠实的客人。\n遇到有需要的人，我哪忍得住不帮一把！更何况人家出手还那么大方！\n\n6. 于贝勒马车旁\n卡尔达鲁斯，如果我没有帮你处理那些匿名订单、给你送补给…\n那你打算怎么办？\n嗯…会一直饿着吧。\n哎呀！但[Player]当时也在啊！\n话虽如此，但艾尔西…\n不管你们听过什么传闻，龙是不吃人的。" },
                { title: "贝勒、卡尔达鲁斯、海登、乔瑟芬、瓦伦", dialogues: "1. 于旅馆\n大家早餐吃得怎么样？\n一如往既的完美，乔瑟芬。向大厨致敬！\n米斯特利亚哪里还有这更好的早餐？你觉得呢，卡尔达鲁斯？\n我看他忙着吃，哪顾得上说感想。\n长话短说…\n可以再来一份吗？\n\n2. 于旅馆\n我在定下周的早午餐菜单。说说…你们几位想吃怎么做的鸡蛋？\n鸡蛋怎样做都合我口味…但我最喜欢的，或许是蓬松的法式咸派。\n煎单面，盖在你们拿手的咖喱上！\n我喜欢白煮蛋，切丁拌沙拉。\n鸡蛋怎么做我都喜欢…但最喜欢的还得是打成$蛋黄酱$！\n但…你不是应该拿蛋黄酱来搭配其它食物吗？\n非要那么讲究的话也不是不行！\n\n3. 于旅馆\n身为医生，我难免对你的生理构造感到好奇，卡尔达鲁斯。\n除了尾巴和独特的腿部结构，你似乎和我们也没什么不同。\n在吃这方面跟我们没什么区别，这点肯定没错！\n谁能拒绝一顿美餐呢？\n而且还是跟朋友们一起分享的美餐！" },
                { title: "卡尔达鲁斯、赛林", dialogues: "1. 于深林\n你知道吗，在深林重新开放之前，我从没亲眼见过$神殿之花$！\n在地震之前，我的神殿就已经被草木掩埋、道路阻塞了。\n龙祭司们精心培育那些花朵，确保了它们足够坚韧。\n若非她们的勤勉，那些苍白的花朵或许无法留存至今。\n真的吗？那我会好好接班，让未来的米斯特利亚人也能欣赏到它们！\n\n2. 于深林\n卡尔达鲁斯，你不冷吗？我带了一壶茶，想暖暖身子的话可以喝！\n谢谢你，赛林。光是捧着这杯茶，我的手就暖了，而你的善意则温暖了我的心。\n你也喝点，[Player]！这是我自己调配的茶！\n\n3. 于深林\n卡尔达鲁斯，你有没有想过搬到镇上来住？你一个人住在深林里，不会觉得孤单吗？\n在这片被回忆照亮的地方，我并不觉得自己是孤身一人。\n何况这片森林既不孤寂，也不空荡…我四周处处皆是生命的低语。\n或许有朝一日，我会改变想法…\n但眼下，我心安于此。\n\n4. 于野外采集\n小时候大家都说深林里有鬼！这不是真的吧？\n往生者的魂魄在此处徘徊？我无法断言…\n然而，岁月会萃聚力量…而深林已历经无数岁月。\n虽然它没有真正的眼目或耳识，但它能感知到我们的存在，也会以自己的方式回应我们。\n这样说能让你安心些吗？\n完全不能！\n\n5. 于野外采集\n你还好吗，卡尔达鲁斯？你好像神思不定。\n啊…\n抱歉，赛林。\n你让我想起一位故人，仅此而已。\n呀！那是好事还是坏事呢？\n不必担心…当然是件令人心安的事。\n\n6. 于野外采集\n苏醒之后，重新认识如今的米斯特利亚是个有趣的过程。许多花草与我那个时代已大不相同。\n这说得通！当年农户们来这里定居时，会从故乡带来各种作物。\n我敢肯定，有些野生种子也沾在行囊上跟着来了。\n是的，我对这种传播方式并不陌生…\n爱穿长袍的人，不得不承受每日数次从衣摆上摘除刺果的宿命。\n\n7. 于赛林的家\n你的房子很舒适，赛林。\n摆了这么多植物，仿佛把花园搬进了屋内。我很喜欢。\n哎呀，真高兴你喜欢！\n\n8. 于赛林的家\n要喝点什么吗？茶怎么样？\n感谢你的款待，我很乐意喝一杯茶。\n太好了！我有绿茶、红茶、茉莉花茶、洋甘菊茶、柠檬茶、苹果茶…\n肉桂苹果茶、苹果姜茶、蜂蜜苹果茶…\n薰衣草茶、玫瑰花茶、薰衣草玫瑰花茶…还有薄荷茶！\n真是惭愧，我一直以为自己与自然颇为亲近…\n却从来不知道，世间竟有如此多的花草皆可入茶。" },
                { title: "卡尔达鲁斯、戴尔、赫姆洛克、卢克、小枫", dialogues: "1.\n那边，那可是米斯特利亚的重要地标…\n我就是在那追青蛙的时候掉进水里的！\n作为真正的龙卫队，我和小枫跟着跳了进去，万一她需要帮忙抓青蛙呢。\n后来朱尼珀姐姐还让我们在澡堂把身上的泥都洗干净了！\n她本来要把我们赶出去的…但幸好我提前练习过最可爱的表情！\n用来拿捏大人。\n我和小乔因为她们弄得到处都是泥，欠了朱尼珀一个星期的晚饭。\n要我说的话，这笔买卖可不亏。\n我明白了…在这座小镇，用一点小麻烦就能换到免费餐食。\n谢谢你们，这个只是非常实用。还有，小枫…\n能不能教教我，如何才能做出你那种威力强大的表情？\n\n2.\n卡尔达鲁斯先生，你和瑟礼蒂亚小姐为什么玩不来呀？\n因为你们是宿敌，命中注定要一直打来打去吗？\n还是说你们其中一个是叛徒，永远永远不能被原谅？\n卡尔达鲁斯，作为一个过来人，过去的事就让它过去吧…\n你不用回答的。\n那么…我便不多言叨扰了。\n好吧…但之后想倾诉的话不要犹豫，来找我哦，好吗？\n\n3.\n卡尔达鲁斯先生，你为什么不穿鞋呀？我妈妈爸爸每天都逼我穿鞋！\n爸爸，我想像卡尔达鲁斯先生一样不穿鞋在雪地里跑来跑去！\n卢克，外面冷得要命，把鞋好好穿着。\n爸爸，我喜欢我的鞋，我不想脱。\n真是女神保佑。\n但…我在此正式请愿，授予戴尔和卢克不穿鞋的权利。\n我向你道歉，赫姆洛克。虽然非我本意，但我给你的家庭带来了灾祸。" },
                { title: "卡尔达鲁斯、艾兰德", dialogues: "1.\n我还有好多问题想问你…希望没有占用你太多时间！\n不会，我很乐意回答我能解答的任何问题。\n\n2.\n谢谢你借给我那些史书，艾兰德。我对所错过的时代开始有了更完整的认识。\n我已有许多疑问在酝酿，等我读完借来的书卷再问。\n听你这么说我好激动啊！随时都可以问我…愿为你效劳！\n\n3.\n你借给我的那些书读来颇受启发，只是阅读它们需要我…慢慢适应。\n我习惯了卷轴。但书籍在许多方面都更易于翻阅，我还在渐渐习惯这种阅读方式。\n\n4. 于艾兰德的办公室\n艾兰德，我留意到你的装束上常出现一种古老的纹样，以点纹点缀的人字形线条。\n是的！这是本地的一种纹样，出现在我们历史记载之初的陶器上。\n它既独具米斯特利亚风格，绣工做起来也容易！我喜欢委托裁缝加上这种装饰。\n我依稀记得这样的纹样。在久远的过去…它被称为麦穗纹，寓意吉祥。\n听你这么说就放心了…要是不吉利的话，我整柜衣服都得换掉了！\n\n5. 于艾兰德的办公室\n你和[Player]一起经历了好多！回过神想想，我竟然一直在和龙誓者并肩共事…\n谁能想到，在她/他/伊/TA农场里找到你的雕像，竟是一段非凡冒险的开端呢！\n不论对她/他/伊/TA还是对你，我都深怀感激之情。多亏你们，我的祭坛得以修复。\n幸好[Player]修好了你的雕像…不然，石像的头部现在就会摆在我的书房里了…\n当然，都是为了文物保护！\n\n6. 于艾兰德的办公室\n卡尔达鲁斯，你见证过许多历史的变迁…\n但愿我们这座朴素的小镇能让你喜欢！虽然算不上什么伟大的王国，但我为我们所建立的一切感到骄傲。\n我珍视着米斯特利亚。\n王国也好，小镇也罢… 无论怎样的规模，其伟大之处都在于居住其中的人们。" },
                { title: "卡尔达鲁斯、艾兰德、埃罗尔", dialogues: "1. 于博物馆\n卡尔达鲁斯，我实在好奇…在从前的龙之纪元，那时的政治格局是怎样的？\n容我回想一下。噢对，那时的一切都格外…翠绿。\n明白了，所以你亲眼见证了一个新国家的诞生！\n不是的，那时放眼望去都是古老的原始树林。若要与如今相较，我想那时的针叶树要多得多。\n咳咳，卡尔达鲁斯大人…或许您可以跟我们讲讲，那时候的管理制度是怎么样的。\n当然好。曾有一过段时期的秋季异常温和，那段时间的河鱼格外肥美。\n\n2. 于博物馆\n卡尔达鲁斯，在巫后崛起之前的世界是怎样的？从仅存的文献来看，听起来很戏剧化啊！\n若要以“戏剧化”来形容倒也不为过。虽然我曾陷入过一些人际间的纷争，但那个年轻纪元中最富戏剧性的事件…\n是？\n就在离这座岛屿不远的地方…\n一座海底火山诞生了！\n它始终未曾破海成陆…但我相信，那之后延续至今的地热活动，正是米斯特利亚那间浴场的热源所在。\n这个信息真够有趣！\n\n3. 于博物馆\n我一直很好奇龙族的文化…能不能说说，社会和家庭结构是怎样的？有哪些节庆习俗？饮食呢？\n啊…龙族大多离群独居，许多习俗都是由个体各自创造并延续的。\n我一生中大部分时光，都在相对隐居中观察自然的轮转，所以我或许不是最理想的调研对象。\n不过，若非要我给出答案，我会说我们最理想的食物是…沉睡之龙旅馆的$海鲜大杂烩$。\n看来龙很会吃嘛。" },
                { title: "卡尔达鲁斯、艾尔西", dialogues: "1.\n艾尔西…我曾见过无数场演出，但你的歌声独树一帜。\n虽然我时常收到赞美，但这话从像你这样阅历悠久的存在口中说出来，又是全新的感受呢。\n谢谢你，卡尔达鲁斯。\n\n2.\n凡人在我沉睡期间创造了如此多的音乐。如今我已苏醒，能够聆听这一切…真是令人振奋，艾尔西。\n嚯嚯！要是想要推荐，找我就对了！\n\n3.\n恕我冒昧，艾尔西，在唱最后一首歌时…你似乎被某种深切的情绪所触动。是想起了些旧日回忆吗？\n哎呀！你对这些事很敏锐啊，卡尔达鲁斯。\n是啊，想起了一段回忆。一段美好的回忆！" },
                { title: "卡尔达鲁斯、海登、埃罗尔", dialogues: "1.\n卡尔达鲁斯，土豆够吃吗？\n嗯，够了，谢谢你。我的盘子里土豆都快堆不下了。\n那咸派呢？要不要再来一块？\n承蒙好意，我够吃了。\n别介意我们，卡尔达鲁斯大人。我们只是惦记着您的身体！\n我可不能让我的客人饿着肚子！\n\n2.\n卡尔达鲁斯，非常感谢你带来的…呃，面包丁？\n感谢！这面包风味很独特，烟熏中带着点甜味！\n啊，其实是蛋糕。或许是我烤得太久了…又或许是火候太大了些？\n我从烤箱里取出来的时候，它就碎了。\n不管怎样，很高兴你们喜欢我最新的烹饪成果。\n\n3.\n海登，你做的家常菜总是那么出色！\n我实在想知道，你是天生的厨师吗？还是有什么诀窍？\n哎哟这样子夸，谢啦！什么天不天分的我是不知道…我只是照着奶奶教我的方法做而已。\n秘密佐料倒是真的有，能让任何菜都更好吃…\n哦？\n多加$黄油$！\n感谢你与我分享这珍贵的家传秘方，海登。\n下次下厨时，这份心得定能派上用场。" },
                { title: "卡尔达鲁斯、海登", dialogues: "1. 于甜水农场\n艾兰德告诉我，这座农场里出土的青铜和青金石文物格外丰富。\n噢对，他可没少跟我说这些！他说这座老农场坐落在阿尔达时代的遗址上。\n那些碎陶器什么的我都留给艾兰德和[Player]了。那些东西对你来说应该没什么特别的意义吧？\n唉，那都是属于我沉眠之后的岁月…阿尔达时代的遗物，其中的意涵与渊源，我都无从领会。\n那对咱俩来说都是没用的东西了！\n嘎哈哈！\n\n2. 于甜水农场\n这座农场里的动物们起初对我很是戒备…但近来，我们渐渐变得亲近了。\n如今它们甚至愿意从我手中取食了，我很感激它们对一个在它们看来是捕食者的存在如此信任。\n要我说，甜水农场的小动物们都很简单直率…\n喂过一次，那就是一辈子的朋友啦！\n我也不例外！\n\n3. 于甜水农场\n这里的生灵与野外的同类气质颇为不同，它们似乎很享受人类的陪伴与爱抚。\n自打人类出现起，人和动物就一直生活在一起，彼此改变着对方。\n我们学会了信任和依赖彼此！\n说起来，这儿的小家伙们个个都喜欢摸摸。欢迎你试试看，卡尔！\n那…我来试试。\n\n4. 于小镇\n看着你的劳作，我渐渐懂得，要维持这座小镇的良好面貌，需要付出许多心血。\n活儿是累人，但我喜欢！走在镇上，看着自己出过力的地方，心里头就是舒坦。\n\n5. 于小镇\n我观察你修缮各处已有不少时日，这让我意识到…\n我也想亲手敲敲打打一番。可以把你的工具借我一用吗？\n这事我做不了主啊，可能得找艾德林特批才行…\n\n6. 于小镇\n[Player]为这座小镇的焕然一新付出了许多。她/他/伊/TA似乎在生活中方方面面都勤勉不辍。\n我观察你修缮各处已有不少时日，这让我意识到…\n确实，要不是她/他/伊/TA，咱们怕斯到现在还在收拾地震后的残局呢。她的努力真是起了大作用！" },
                { title: "卡尔达鲁斯、朱尼珀", dialogues: "1. 于泡泡屋\n朱尼珀，有一种香气，不知你能否重现。\n倒不是什么要紧之物，只是…我很怀念。\n我就喜欢挑战！详细跟我说说，我出去采集的时候会留意的。\n\n2. 于泡泡屋\n你和瑟礼蒂亚的处世理念真够大相径庭的啊？\n我从来没想过龙与龙之间也会意见不合。\n意见相合？与瑟礼蒂亚？那是不可能的。\n且不说别的，你见识过她的装潢品味了吗？\n\n3. 于泡泡屋\n困困向来很亲人，但你和他相处得比我想象的要融洽。\n是这样吗？也许他能感受到我对他的欣赏吧…\n在这间浴场里，他是一个令人心神安宁、沉稳如山的存在。\n确实。\n等等。那我算什么？\n\n4.\n朱尼珀，你对东边小道的植物似乎非常了解。\n那当然，我可是专家嘛。\n不过具体去哪最好采，还是赛林告诉我的。那个乡下姑娘还挺让人刮目相看的。\n嗯…你们两个都与这片土地有着深厚的联系。\n\n5.\n[Player]跟我说了，是你把力量借给她/他/伊/TA的。\n难怪从她/他/伊/TA身上感知到的魔力那么独特。\n我只是推开了一扇门。无论有没有我，[Player]都有能力成就伟大的事业。\n话是这么说…但有一条龙做队友，总归是件好事吧。\n\n6. 于野外采集\n和你一起寻找草药颇为惬意。\n但你看起来有些紧张，朱尼珀。怎么了？\n唉，瑟礼蒂亚不太待见你嘛，我怕她看见我们一起。\n别担心，我知道怎么应付她。\n如果她问起来，我就说些你在研究我的弱点，诸如此类的话。\n不过你的顾虑也不无道理。她的占有欲…确实颇为强烈。" },
                { title: "卡尔达鲁斯、兰登、瑞斯", dialogues: "1.\n层次分明的造型配上宽大的轮廓…不错的风格，卡尔达鲁斯。\n不知道路易斯能不能给我也做一件类似的…\n如果能帮到你，我不介意借你一件衣服作为打版参考。\n哦嚯，我也要我也要！谁不想来一两件气派的袍子呢！\n\n2.\n我注意到这一带有一种红冠的鸟，颇为常见。\n在从前，它们的名字译作“红烛芯”。你知道现代的名字吗，瑞斯？\n现在叫绯红唐纳雀。它们的颜色很醒目，对吧？\n看来不论时代，大家都注意到了它们身上那火焰般的特征。\n任何关于鸟类的事，瑞斯就是你的专家！\n叔叔，也不用这么推销我吧…\n不过他说得确实没错。\n\n3.\n卡尔达鲁斯，我在想啊…\n镇上来了那么多新面孔，我们得开一场像样的派对！\n叔叔…\n我们两个一起让镇子燥起来！\n通宵狂欢！\n…\n怎么样，卡尔！你来不来？\n我…\n尽力奉陪。" },
                { title: "卡尔达鲁斯、瑞斯", dialogues: "1.\n你看，做速发面包的秘诀就在于，面糊不能放太久才进烤箱。\n小苏打和湿料里的酸一混合就会起反应、产生气泡，这样面糊在烤箱里就能发起来。\n关键全在时机。\n烹饪与炼金术竟然如此相像…你真是座知识宝库，瑞斯。\n\n2.\n是的，蛋糕面糊不需要过多搅拌。\n如果你搅拌太多，就会把所有空气都挤出去。蛋糕在烤箱里就会塌下去，变得硬邦邦的。\n原来如此…我过去的错误都昭然若揭了。\n但你说你是木匠？看来我还有很多要学…\n\n3.\n打鸡蛋不能太用力。\n搅拌得越狠，鸡蛋的组织就越散。等做出来的时候口感就全不对了。\n像煎蛋卷这种简单的东西会变得像橡胶一样嚼不烂，蛋白霜这类精细的就更别提了，直接结块。\n我明白了…即便是朴素的煎蛋卷也有它的秘诀。\n\n4.\n嗨，[Player]，要加入我们吗？\n我们正在欣赏大自然的合奏。\n真动听。\n\n5.\n这几面墙壁看起来比米斯特利亚如今的建筑要古老得多。\n我很确信这片废墟之中已经生长过好几代树木了。\n地震时倒下的那棵老山楂树已经活了几百年了。这么算来，这栋建筑在它还是一株幼苗之前就已经存在了。\n让人感慨，对吧？米斯特利亚以过往的层层岁月为基石，才成长至我们所熟悉的样子。\n从衰败中绽放新生。\n嗯…这话说得好。" },
                { title: "卡尔达鲁斯、泰瑞西亚", dialogues: "1.\n看你收竿的姿态，如同一首遣词造句都恰到好处的诗词。\n能看到一位走对了自己道途的凡人真是太美好了。\n哦豁，你这话说得也太漂亮了！\n我可要认真起来了…要是让下一条鱼跑掉，咱俩可就都出丑咯！\n\n2.\n卡尔达鲁斯啊，我一直在想…你跟大自然是一体的，大概是这意思，对吧。\n那我在这儿把各种鱼啊虾啊的都钓上来，你不会介意吗？\n我并不介意。毕竟，在我还是龙形的时候，也是大口大口地吃着鱼的。\n你行事审慎，为人慷慨，心怀感恩。能做到这些，已是足矣。\n自然本就是一个循环，生命会再次到来。\n\n3.\n泰瑞西亚，我试着像你一样用鱼竿钓鱼，但我的爪子总缠在线上，实在是令人恼火。\n这么说，你钓上来的唯一一条鱼，就是你自己咯！\n咔哈哈！" }
            ]},
            main: { content: [
                "从矿洞里传来的话语？\n我记得很久以前，人类在地上地下都会进行祈祷仪式。\n已经过了太久了，久到人类已历经多个世代的更替。",
                "地震…和地底下的矿洞…\n唔…[Player]，请你进一步调查此事。我的直觉告诉我，这将是解开$魔法为何能回归这片土地$的重要线索。",
                "你感受到空气中的变化了吗？魔力的流动增强了。\n矿洞重见天日了？有趣…\n[Player]，有什么进展，随时告知。我能感觉到力量在慢慢恢复，但记忆仍然像被卡住一般。",
                "我认为最好彻底探索矿洞。随着你的深入，你能挖掘到更多有价值的信息和事物。",
                "你在地底下发现了$破裂的封印$？\n啊…我隐约记得，这种封印曾用于控制我们领域之间的魔法流动。\n[Player]，我将此任务托付于你——\n$打破封印吧$，也许我能拿回更多的力量。",
                "你和艾兰德在合力搜寻一个叫$龙誓者$的人的盔甲？嗯…\n这个名头听起来有点熟悉，但我的记忆依旧很模糊。抱歉，没办法为你提供帮助。",
                "矿洞中涌出的魔力日渐丰沛，我的神思也随之清明了几分。\n我想起，曾居于此地的人类一度广泛运用着魔法。\n细细想来，其中部分力量，似乎正是由我亲手赐予的…\n抱歉，我多希望能回忆起更多。",
                "你扫除了地震造成的障碍？\n做得好。我很高兴看到事情恢复得井然有序。",
                "你帮忙修好了出入小镇的桥梁？\n你真棒，[Player]。相信居民们都很感激你的付出。",
                "我看到你们修好了镇上的磨坊，恢复了它往日的风采。\n做得好，托此之福，居民的生活质量一定能得到提升。",
                "[Player]，听闻你帮助镇民补充了储备，我心甚慰。\n关怀她人福祉，着实可嘉。",
                "镇上的杂货店焕然一新了？干得好。\n助人之时，亦是自助之举。",
                "（矿洞100层后续，含重要剧透）记忆开始恢复，这感觉有些奇怪…\n尤其是如今，我得以从凡人的视角去重新审视它们。\n事后再看，我意识到当初$封印瑟礼蒂亚$的决定，对人类造成了深远的影响。\n我曾经用黑白分明的方式思考、行事。\n何等愚蠢。\n明明我们身处的世界既不在至寒的黑暗之中、不在灼目的辉光之下——\n而在于那两者之间那片可以栖息的荫翳里。\n让我不禁怀疑，当年那个决定是否正确…\n\n- 我觉得你已经做了力所能及的最好选择…\n[Player]，你这么说太善良了。\n\n- 这恐怕要看问的是谁了吧…\n你的观点很公正，瑟礼蒂亚一定会认为那是个糟糕透顶的决定。\n\n我想，这份萦绕心头的不确定感，是我必须学着与之共处的东西了。\n尽管如此，我仍然感激我所选择的道路最终将我引领到了今天。\n这是我永远不会后悔的事。"
            ]},
            love: { content: [
                "当我逐渐适应现状后，开始学着认真而感恩地度过每一天。\n[Player]，你向我树立了很好的榜样。\n不论是在农场弯腰耕作，在矿洞挥动镐头，还是为朋友奔波操劳…你从不敷衍任何一件事的态度，令我何其敬佩。",
                "我时常怀念以雕像之形与你交谈的日子。那些相伴如此真切，然而…\n【矿洞终局前差分】终有一日， 我想亲自造访你的农场。 \n【矿洞终局后差分】我忍不住期待下一次再亲身拜访了。\n- 随时欢迎你来呀！ \n【矿洞终局前差分】谢谢你，[Player]。想必那里已焕然一新， 我期待亲眼去见证。 或许我还能帮上些忙， 虽然我还未试过剪羊毛。 不知道我的爪子够不够利呢？\n【矿洞终局后差分】谢谢你，[Player]。能亲眼看着你的农场随着时间慢慢变化，真好。也许改天我也能搭把手，虽然我还未试过剪羊毛。 不知道我的爪子够不够利呢？\n- 我得先收拾一下才行… \n我会尊重你的想法…但你这份迟疑反倒激起了我的好奇。[Player]，我想了解你所有的面貌。农场杂务我也乐意分担，不过我对剪羊毛毫无经验。不知道我的爪子够不够利呢？",
                "啊，[Player]。抱歉，刚才在想个奇怪的问题。\n人类是如此脆弱，对自然之力束手无策…\n为何没有进化出龙鳞呢？这该是多精妙的护甲啊。\n- 所以我们发明了衣服和盔甲呀。\n也是…以创造化解万难。\n正是人类的智慧所在。\n你们下次该学着造翅膀了。虽以我现在的姿态无法亲自相助，但凌空之乐不容错过。\n- 确实，长了鳞片的话一定很有用…\n以我的亲身经历来说，我十分推荐鳞片。\n不过我相信，人类总能以创造化解万难。\n你们下次该学着造翅膀了。虽以我现在的姿态无法亲自相助，但凌空之乐不容错过。",
                "【矿洞终局前】你明知我无法回馈同等的心意，你却仍然这般跋涉而来…\n这份情谊，令我动容。\n希望你今后也仍愿意如此纵容我。\n\n【矿洞终局后】从前，你不辞辛苦到$深林$看望我…\n每每想起，我心中都满是感动。\n现在我能自由行动，我打算回报这份情谊。",
                "在这深林腹地，时光的流逝显得缓慢而凝重。\n独自徘徊时，这份迟缓难免让心灵变得沉重…\n可与你相伴时，却连这份迟缓都显得太过匆忙，时光也显得惬意起来，甚至令人沉醉。",
                "这寒冬令龙族也觉得难熬。[Player]，你觉得冷吗？\n请收下这杯=灵菇茶=，刚从我的炉火边煨好。\n或许茶叶泡得久了些…但希望它能暖一暖你的身心。",
                "米斯特利亚的孩子们令我心生喜爱。\n卢克通晓大自然的生物，连虫鸣都能读作讯息。\n小枫洞察尘世权力的暗涌。\n而戴尔的勇气将她们凝聚为同盟。\n这般年幼便建立起龙之守卫队，各展所长。\n初代的龙卫队如果能见到薪火相传， 定当欣慰。 \n- 等等… 真的有龙之守卫队？ \n【矿洞终局前】没错。我无法想起太多， 但记得最初也是群孩童挚友。 \n【矿洞终局后】巧合的是，最初也是群孩童挚友。 \n\n不过戴尔、小枫和卢克…要来得更淘气些。\n能让孩子肆意欢笑的土地，才是真正的乐土。米斯特利亚正是如此，令我欣慰。\n【矿洞终局前】\n- 孩子们要是见到你一定要乐开花了。 \n我也期待与她们相见， 孩子们的存在令我欢欣。 \n【矿洞终局后】\n- 孩子们见到你的时候真是乐开花了！\n我也很开心能见到她们！真是可爱的孩子们。\n\n让世界永葆朝气…\n偶尔迸发的智慧连学者也为之惊叹…\n孩童的存在更提醒了我们何为至要。\n能让孩子肆意欢笑的土地，才是真正的乐土。米斯特利亚正是如此，令我欣慰。",
                "自然界的生灵大多饮食单调，飞鸟食虫，虫噬绿叶。\n而人类却懂得栽培万物，烹调百味。\n如今我也开始喜欢上人类世界的各种美食了，希望有日能尝遍人间风味。\n- 那我可得多为你下厨啦！\n真的吗？\n我不挑食。在厨艺上厄运连连，早让我练就了面不改色吞下任何焦炭的本事。\n期待你带来亲手做的料理，我一定会细品慢尝。\n- 你之前都吃些什么？\n我记得生啖过无数从海里攫取的鲜鱼。\n人类不也有类似吃法？\n由奢入俭难，尝过精致的刺身后，再难回归茹毛饮血的日子了。",

        function switchTab(tabId) {
            const sub = document.getElementById('sub-nav');
            const dis = document.getElementById('display');
            sub.innerHTML = ""; dis.innerHTML = "";
            document.querySelectorAll('.main-nav .glass-btn').forEach(b => b.classList.remove('active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('active');

            const tabData = SITE_DATA[tabId];
            if(tabData.subs) {
                tabData.subs.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = 'glass-btn';
                    btn.innerText = s.t;
                    btn.onclick = () => render(tabId, s.id);
                    sub.appendChild(btn);
                });
                render(tabId, tabData.subs[0].id);
            } else if(tabId === 'multi' || tabId === 'quest') {
                renderAccordion(tabData.content);
            } else {
                renderList(tabData.content);
            }
        }

        function render(tab, subId) {
            const dis = document.getElementById('display');
            const data = SITE_DATA[tab][subId];
            dis.innerHTML = data.map((t, i) => `<div class="text-line"><span class="num-tag">#${i+1}</span>${format(t)}</div>`).join('');
            dis.scrollTop = 0;
            document.querySelectorAll('#sub-nav .glass-btn').forEach(b => {
                b.classList.toggle('active', b.innerText === SITE_DATA[tab].subs.find(x=>x.id===subId).t);
            });
        }

        function renderList(list) {
            const dis = document.getElementById('display');
            dis.innerHTML = list.map((t, i) => `<div class="text-line"><span class="num-tag">#${i+1}</span>${format(t)}</div>`).join('');
        }

        function renderAccordion(list) {
            const dis = document.getElementById('display');
            dis.innerHTML = list.map((item, i) => `
                <div class="card" id="card-${i}">
                    <div class="card-head" onclick="toggleCard(${i})"><span>${item.title}</span><span>▼</span></div>
                    <div class="card-body">${format(item.dialogues)}</div>
                </div>
            `).join('');
        }

        function toggleCard(i) {
            const c = document.getElementById(`card-${i}`);
            const isOpen = c.classList.contains('open');
            document.querySelectorAll('.card').forEach(x => x.classList.remove('open'));
            if(!isOpen) c.classList.add('open');
        }
